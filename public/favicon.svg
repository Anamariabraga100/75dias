<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Reset90">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="50%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#050505"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="url(#ring)" stroke-width="30" stroke-linecap="round" stroke-dasharray="720 180" transform="rotate(-90 256 256)"/>
  <text
    x="256"
    y="300"
    text-anchor="middle"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-weight="900"
    font-size="168"
    fill="#f5f5f5"
    letter-spacing="-8"
  >90</text>
